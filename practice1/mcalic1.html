<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Information Form</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card{
            width: 100%;
            max-width: 650px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,.2);
        }

        .card-header{
            background: #0d6efd;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 15px 15px 0 0 !important;
        }

        .form-control:focus,
        .form-select:focus{
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13,110,253,.25);
        }

        .btn-primary{
            width: 100%;
            padding: 12px;
            font-size: 18px;
        }

        .required{
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            Person Information Form
        </div>

        <div class="card-body">

            <form>

                <div class="mb-3">
                    <label class="form-label">
                        Full Name <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="Enter your full name"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Address <span class="required">*</span>
                    </label>
                    <textarea
                        class="form-control"
                        rows="3"
                        placeholder="Enter your address"
                        required></textarea>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Email <span class="required">*</span>
                        </label>
                        <input
                            type="email"
                            class="form-control"
                            placeholder="example@email.com"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Birthday <span class="required">*</span>
                        </label>
                        <input
                            type="date"
                            class="form-control"
                            required>
                    </div>

                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Sex <span class="required">*</span>
                    </label>

                    <select class="form-select" required>
                        <option selected disabled>Select Sex</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                        <option>Prefer not to say</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Submit
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
